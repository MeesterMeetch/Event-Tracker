kind = "mobile"
previewPath = "/ev-mobile/"
title = "EV Tracker Mobile"
version = "1.0.0"
id = "artifacts/ev-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/ev-mobile/" ]
localPort = 21134

[services.development]
run = "pnpm --filter @workspace/ev-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ev-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ev-mobile", "run", "serve" ]

[services.env]
PORT = "21134"
BASE_PATH = "/ev-mobile/"
