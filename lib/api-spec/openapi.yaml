openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bets
    description: Bet logging, editing, and settlement
  - name: edges
    description: Live positive-EV opportunities
  - name: events
    description: Upcoming games for a sport
  - name: rankings
    description: League standings and stat leaders
  - name: dashboard
    description: Aggregate performance stats
  - name: sports
    description: Supported sports list
  - name: analysis
    description: AI game analysis and probable starters
  - name: model
    description: Fundamental pitcher-strikeout projection model
  - name: paper-trades
    description: Model paper trades and closing-line-value validation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sports:
    get:
      operationId: listSports
      tags: [sports]
      summary: List supported sports
      responses:
        "200":
          description: Supported sports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sport"
  /edges:
    get:
      operationId: listEdges
      tags: [edges]
      summary: Scan a sport for live positive-EV opportunities
      description: >
        Fetches current odds for the given sport across books, devigs each
        market to estimate a fair price, and returns outcomes where the best
        available price beats the fair price. Costs live API credits, so a
        sport must be specified explicitly.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
        - name: minEdgePercent
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Positive-EV opportunities found for the sport
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EdgeOpportunity"
        "400":
          description: Invalid or unsupported sport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream odds provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List upcoming games for a sport
      description: >
        Lists upcoming games so a single game can be drilled into for player
        props. Backed by the free Odds API events endpoint — costs no credits.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upcoming games, soonest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameEvent"
        "400":
          description: Invalid or unsupported sport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream odds provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /prop-edges:
    get:
      operationId: listPropEdges
      tags: [edges]
      summary: Scan one game's player props for positive-EV opportunities
      description: >
        Fetches player prop odds for a single event across US books, devigs
        each book's over/under pair per player and line, and returns props
        where the best available price beats the consensus fair price. Player
        props are only available per event and each market scanned costs API
        credits, which is why props are scanned one game at a time.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
        - name: eventId
          in: query
          required: true
          schema:
            type: string
        - name: minEdgePercent
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Positive-EV player props found for the game
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EdgeOpportunity"
        "400":
          description: Invalid sport, or player props not supported for it
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream odds provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rankings-sports:
    get:
      operationId: listRankingsSports
      tags: [rankings]
      summary: List sports with standings available
      description: >
        Sports that have a standings source configured. Independent of the
        odds in-season list, so leagues keep their standings during the
        off-season.
      responses:
        "200":
          description: Rankings-capable sports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingsSport"
  /standings:
    get:
      operationId: listStandings
      tags: [rankings]
      summary: League standings for a sport
      description: >
        Current standings grouped by league/conference/division, sourced from
        free public feeds and cached server-side for a few hours.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Standings groups in feed order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandingsGroup"
        "400":
          description: Sport has no standings source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream standings feed error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /leaders:
    get:
      operationId: listLeaders
      tags: [rankings]
      summary: Stat leaders for a sport
      description: >
        Top players per stat category. Returns an empty array for sports that
        have standings but no leaders feed. Cached server-side.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leader categories, empty when no leaders feed exists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderCategory"
        "400":
          description: Sport has no standings source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream leaders feed error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bets:
    get:
      operationId: listBets
      tags: [bets]
      summary: List logged bets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BetStatus"
      responses:
        "200":
          description: Bets, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"
    post:
      operationId: createBet
      tags: [bets]
      summary: Log a new bet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetInput"
      responses:
        "201":
          description: Bet logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: >-
            Duplicate open bet — a pending bet on the same game, market,
            selection, point, and book is already in the log. Logging it
            again would double-count the stake in profit and ROI. Once the
            earlier bet settles, the same market can be logged again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bets/{id}:
    get:
      operationId: getBet
      tags: [bets]
      summary: Get a single bet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "404":
          description: Bet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBet
      tags: [bets]
      summary: Manually edit or settle a bet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetUpdate"
      responses:
        "200":
          description: Bet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "404":
          description: Bet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBet
      tags: [bets]
      summary: Delete a logged bet
      description: >-
        Soft-deletes the bet: it disappears from the log and dashboard stats
        immediately, but the row (including any captured closing-line/CLV data
        and settled P&L) is kept for a short grace period so the delete can be
        undone via the restore endpoint. Soft-deleted rows are purged after
        the grace period.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted (restorable for a short grace period)
        "404":
          description: Bet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bets/{id}/restore:
    post:
      operationId: restoreBet
      tags: [bets]
      summary: Undo a recent bet delete
      description: >-
        Restores a soft-deleted bet exactly as it was — logged odds, units,
        status, P&L, and any captured closing-line/CLV data. Returns 404 once
        the bet is no longer restorable (grace period elapsed or the id never
        existed).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The restored bet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "404":
          description: No restorable bet with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overall and per-sport performance stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /analysis:
    post:
      operationId: generateGameAnalysis
      tags: [analysis]
      summary: Generate an AI analysis for a game
      description: >
        Produces an AI-written scouting and betting analysis for a single game,
        including probable starting pitchers and their recent form for MLB.
        Results are cached briefly per game to limit AI usage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameAnalysisRequest"
      responses:
        "200":
          description: Generated analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameAnalysisResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /model-edges:
    get:
      operationId: listModelEdges
      tags: [model]
      summary: Project pitcher strikeouts for one game and compare to the market
      description: >
        Runs the fundamental strikeout-projection model on both probable
        starters in an MLB game (free MLB Stats API) and compares the model's
        over/under probabilities against the de-vigged pitcher-strikeout market
        for that event. Fetching the market costs per-event API credits, so a
        single event is scanned at a time. MLB only.
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
        - name: eventId
          in: query
          required: true
          schema:
            type: string
        - name: minEdgePercent
          in: query
          required: false
          schema:
            type: number
        - name: kellyMultiplier
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Per-pitcher projections with model-vs-market lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelPitcherProjection"
        "400":
          description: Invalid or unsupported sport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream odds provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /paper-trades:
    get:
      operationId: listPaperTrades
      tags: [paper-trades]
      summary: List model paper trades
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaperTradeStatus"
      responses:
        "200":
          description: Paper trades, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaperTrade"
    post:
      operationId: createPaperTrade
      tags: [paper-trades]
      summary: Log a model flag as a paper trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperTradeInput"
      responses:
        "201":
          description: Paper trade logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTrade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: >-
            Duplicate pick — a paper trade for the same game, pitcher,
            selection, point, and book is already logged. Each pick counts
            once in the scorecard; duplicates would inflate its stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /paper-trades/summary:
    get:
      operationId: getPaperTradeSummary
      tags: [paper-trades]
      summary: Model validation summary (CLV and beat-the-close rate)
      responses:
        "200":
          description: Aggregate validation stats over paper trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTradeSummary"
  /paper-trades/{id}:
    patch:
      operationId: updatePaperTrade
      tags: [paper-trades]
      summary: Correct a paper trade's logged price
      description: >-
        Fixes a mistyped American odds price on an existing paper trade without
        deleting and re-logging it, preserving the original edge snapshot and
        any captured closing-line data. If a closing line has already been
        captured, CLV% and beat-close are recomputed from the corrected open
        price; the captured closingOdds/closingProb are never modified.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperTradeUpdate"
      responses:
        "200":
          description: The corrected paper trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTrade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Paper trade not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePaperTrade
      tags: [paper-trades]
      summary: Delete a paper trade
      description: >-
        Soft-deletes the trade: it disappears from lists and summary stats
        immediately, but the row (including any captured closing-line data)
        is kept for a short grace period so the delete can be undone via the
        restore endpoint. Soft-deleted rows are purged after the grace period,
        or immediately if the same pick is logged again.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted (restorable for a short grace period)
        "404":
          description: Paper trade not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /paper-trades/{id}/restore:
    post:
      operationId: restorePaperTrade
      tags: [paper-trades]
      summary: Undo a recent paper-trade delete
      description: >-
        Restores a soft-deleted paper trade exactly as it was — logged odds,
        edge snapshot, status, and any captured closing-line data. Returns 404
        once the trade is no longer restorable (grace period elapsed, the pick
        was re-logged, or the id never existed).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The restored paper trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTrade"
        "404":
          description: No restorable paper trade with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ModelKLine:
      type: object
      required:
        - point
        - selection
        - americanOdds
        - book
        - marketProb
        - modelProb
        - edgePercent
        - fullKellyFraction
        - recommendedUnits
        - isFlagged
      properties:
        point:
          type: number
        selection:
          type: string
        americanOdds:
          type: number
        book:
          type: string
        marketProb:
          description: De-vigged market consensus for this side; null when fewer than 2 books quote it.
          type: ["number", "null"]
        modelProb:
          type: number
        edgePercent:
          type: ["number", "null"]
        fullKellyFraction:
          type: number
        recommendedUnits:
          type: number
        isFlagged:
          type: boolean
    ModelPitcherProjection:
      type: object
      required:
        - gameId
        - sport
        - commenceTime
        - homeTeam
        - awayTeam
        - pitcher
        - team
        - opponent
        - throws
        - projectedBattersFaced
        - expectedStrikeouts
        - ratePerBF
        - opponentFactor
        - sampleStarts
        - sampleBattersFaced
        - opponentDataAvailable
        - insufficientData
        - lines
      properties:
        gameId:
          type: string
        sport:
          type: string
        commenceTime:
          type: string
          format: date-time
        homeTeam:
          type: string
        awayTeam:
          type: string
        pitcher:
          type: string
        team:
          type: string
        opponent:
          type: string
        throws:
          type: ["string", "null"]
        projectedBattersFaced:
          type: number
        expectedStrikeouts:
          type: number
        ratePerBF:
          type: number
        opponentFactor:
          type: number
        sampleStarts:
          type: integer
        sampleBattersFaced:
          type: integer
        opponentDataAvailable:
          type: boolean
        insufficientData:
          description: >
            True when the pitcher's strikeout-rate inputs were missing or
            degraded (no rolling starts and no season/career sample). The model
            abstains from projecting rather than emit a confident number off
            zeroed inputs; numeric fields are placeholders and lines is empty.
          type: boolean
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ModelKLine"
    PaperTradeStatus:
      type: string
      enum: [open, closed, expired]
    PaperTrade:
      type: object
      required:
        - id
        - sport
        - gameId
        - commenceTime
        - homeTeam
        - awayTeam
        - pitcher
        - pitcherId
        - team
        - opponent
        - selection
        - point
        - book
        - americanOdds
        - modelProb
        - marketProb
        - edgePercent
        - expectedStrikeouts
        - projectedBattersFaced
        - recommendedUnits
        - kellyMultiplier
        - closingOdds
        - closingProb
        - clvPercent
        - beatClose
        - status
        - createdAt
      properties:
        id:
          type: integer
        sport:
          type: string
        gameId:
          type: string
        commenceTime:
          type: string
          format: date-time
        homeTeam:
          type: string
        awayTeam:
          type: string
        pitcher:
          type: string
        pitcherId:
          type: ["integer", "null"]
        team:
          type: string
        opponent:
          type: string
        selection:
          type: string
        point:
          type: number
        book:
          type: string
        americanOdds:
          type: number
        modelProb:
          type: number
        marketProb:
          type: ["number", "null"]
        edgePercent:
          type: ["number", "null"]
        isFlagged:
          description: >-
            The model's actual flag decision recorded at log time. Null for
            legacy rows logged before the flag was persisted.
          type: ["boolean", "null"]
        expectedStrikeouts:
          type: number
        projectedBattersFaced:
          type: number
        recommendedUnits:
          type: number
        kellyMultiplier:
          type: number
        closingOdds:
          type: ["number", "null"]
        closingProb:
          type: ["number", "null"]
        clvPercent:
          type: ["number", "null"]
        beatClose:
          type: ["boolean", "null"]
        status:
          $ref: "#/components/schemas/PaperTradeStatus"
        createdAt:
          type: string
          format: date-time
    PaperTradeInput:
      type: object
      required:
        - sport
        - gameId
        - commenceTime
        - homeTeam
        - awayTeam
        - pitcher
        - team
        - opponent
        - selection
        - point
        - book
        - americanOdds
        - modelProb
        - expectedStrikeouts
        - projectedBattersFaced
        - recommendedUnits
        - kellyMultiplier
      properties:
        sport:
          type: string
        gameId:
          type: string
        commenceTime:
          type: string
          format: date-time
        homeTeam:
          type: string
        awayTeam:
          type: string
        pitcher:
          type: string
        pitcherId:
          type: ["integer", "null"]
        team:
          type: string
        opponent:
          type: string
        selection:
          type: string
        point:
          type: number
        book:
          type: string
        americanOdds:
          type: number
        modelProb:
          type: number
        marketProb:
          type: ["number", "null"]
        edgePercent:
          type: ["number", "null"]
        isFlagged:
          description: The model's actual flag decision for this line at scan time.
          type: ["boolean", "null"]
        expectedStrikeouts:
          type: number
        projectedBattersFaced:
          type: number
        recommendedUnits:
          type: number
        kellyMultiplier:
          type: number
    PaperTradeUpdate:
      type: object
      required: [americanOdds]
      properties:
        americanOdds:
          description: >-
            Corrected American odds price. Valid prices are at most -100 or at
            least +100; the open interval (-100, 100) does not exist on the
            American odds scale.
          oneOf:
            - type: number
              maximum: -100
            - type: number
              minimum: 100
    PaperTradeSummary:
      type: object
      required:
        - total
        - open
        - closed
        - expired
        - gradedCount
        - beatCloseCount
        - beatCloseRate
        - avgClvPercent
        - avgEdgePercent
      properties:
        total:
          type: integer
        open:
          type: integer
        closed:
          type: integer
        expired:
          type: integer
        gradedCount:
          description: Closed trades that have a captured closing line (CLV computed).
          type: integer
        beatCloseCount:
          type: integer
        beatCloseRate:
          type: ["number", "null"]
        avgClvPercent:
          type: ["number", "null"]
        avgEdgePercent:
          type: ["number", "null"]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Sport:
      type: object
      required: [key, title, group, supportsProps]
      properties:
        key:
          type: string
        title:
          type: string
        group:
          type: string
        supportsProps:
          description: Whether per-game player-prop scanning is available for this sport.
          type: boolean
    GameEvent:
      type: object
      required: [id, sport, commenceTime, homeTeam, awayTeam]
      properties:
        id:
          type: string
        sport:
          type: string
        commenceTime:
