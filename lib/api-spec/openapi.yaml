    BetInput:
      type: object
      required:
        - sport
        - gameId
        - commenceTime
        - homeTeam
        - awayTeam
        - market
        - selection
        - point
        - americanOdds
        - units
      properties:
        sport:
          type: string
        gameId:
          type: string
        commenceTime:
          type: string
          format: date-time
        homeTeam:
          type: string
        awayTeam:
          type: string
        market:
          type: string
        selection:
          type: string
        point:
          type: ["number", "null"]
        americanOdds:
          description: >-
            American odds price. Valid prices are at most -100 or at least
            +100; the open interval (-100, 100) does not exist on the
            American odds scale.
          oneOf:
            - type: number
              maximum: -100
            - type: number
              minimum: 100
        units:
          description: >-
            Stake in units. Must be at least 0.01u — the same minimum the web
            and mobile bet forms enforce via the shared client rules.
          type: number
          minimum: 0.01
        fairOdds:
          type: ["number", "null"]
        evPercent:
          type: ["number", "null"]
        book:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
