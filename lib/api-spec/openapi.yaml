    SportBreakdown:
      type: object
      required: [sport, bets, won, lost, push, pending, settledUnits, roiPercent, pnl]
      properties:
        sport:
          type: string
        bets:
          type: integer
        won:
          type: integer
        lost:
          type: integer
        push:
          type: integer
        pending:
          type: integer
        settledUnits:
          description: >-
            Realized settled stake for this sport — the sum of units on bets
            that are settled AND have a real pnl. This is the sport-level ROI
            denominator, mirroring the top-level totalUnits semantics; clients
            must key P&L/ROI muting off this, not the W-L-P count, so a bet
            settled with a still-null pnl can't produce an unmuted green zero.
          type: number
        roiPercent:
          type: number
        pnl:
          type: number
    DashboardSummary:
      type: object
      required:
        - totalBets
        - won
        - lost
        - push
